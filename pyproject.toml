[tool.ruff]
target-version = "py312"
line-length = 100
src = ["backend"]

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
]
ignore = [
    "E501",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
check_untyped_defs = true
no_implicit_optional = true
pretty = true
files = [
    "backend/app/config.py",
    "backend/app/errors.py",
    "backend/app/schemas",
    "backend/app/services",
]

[[tool.mypy.overrides]]
module = [
    "dateparser",
    "dateparser.search",
]
ignore_missing_imports = true
